name: Build & Push Docker Image
on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize]
    branches: [main, develop]

env:
  IMAGE: ghcr.io/${{ github.repository }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # -----------------------------------------------------------------
  # Build per-arch Docker images natively
  # -----------------------------------------------------------------
  build:
    name: Build Image (${{ matrix.arch }})
    if: |
      github.ref_name == 'main' && github.event_name == 'push' ||
      github.base_ref == 'main'
    strategy:
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Load .env
        run: |
          set -a
          source .env
          echo "BASE_VERSION=$BASE_VERSION" >> "$GITHUB_ENV"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Log in to GHCR
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/${{ matrix.arch }}
          push: true
          build-args: |
            BASE_VERSION=${{ env.BASE_VERSION }}
            VERSION=${{ env.VERSION }}
          tags: ${{ env.IMAGE }}:${{ env.VERSION }}-${{ matrix.arch }}
          cache-from: type=gha,scope=build-${{ matrix.arch }}
          cache-to: type=gha,scope=build-${{ matrix.arch }},mode=max

  # ---------------------------------------------------------------------------
  # Create multi-arch manifest and publish
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy
    needs: build
    if: github.event_name == 'push'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Load .env
        run: |
          set -a
          source .env
          echo "BASE_VERSION=$BASE_VERSION" >> "$GITHUB_ENV"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Create and push manifest
        run: |
          BASE_VERSION=${{ env.BASE_VERSION }}
          VERSION=${{ env.VERSION }}
          TAG_ARGS=("-t" "${IMAGE}:${VERSION}")

          # Positive regex check for Final versions (e.g., 1.2.3)
          if [[ $VERSION =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            TAG_ARGS+=("-t" "${IMAGE}:latest")
          fi

          docker buildx imagetools create \
            --annotation "index:org.opencontainers.image.title=python-debian" \
            --annotation "index:org.opencontainers.image.description=Python base image" \
            --annotation "index:org.opencontainers.image.version=${VERSION}" \
            --annotation "index:org.opencontainers.image.authors=AJ Slater <aj@slater.net>" \
            --annotation "index:org.opencontainers.image.source=https://github.com/ajslater/python-debian" \
            --annotation "index:org.opencontainers.image.licenses=GPL-3.0-only" \
            "${TAG_ARGS[@]}" \
            "${IMAGE}:${VERSION}-amd64" \
            "${IMAGE}:${VERSION}-arm64"
