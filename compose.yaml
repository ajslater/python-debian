services:
  ci:
    image: ${CI_IMAGE}
    container_name: ${CI_CONTAINER}
    volumes:
      - ./test-results:/app/test-results
      - ./dist:/app/dist
    environment:
      - PYTHONUNBUFFERED=1
    entrypoint:
      - sleep
      - infinity
  python-debian:
    image: ghcr.io/ajslater/python-debian
    build:
      context: .
      args:
        VERSION: null
    env_file: .env
